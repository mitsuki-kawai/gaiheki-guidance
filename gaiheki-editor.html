<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gaiheki+ ガイダンスエディタ</title>
<style>
:root {
  --main:   #3F3277;
  --action: #3F3277;
  --bg:     #F3F3F3;
  --text:   #1a1a1a;
  --white:  #ffffff;
  --border: #d0d0d0;
  --label:  #555555;
  --muted:  #999999;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── ヘッダー ── */
.header { height: 56px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
.btn-back { font-size: 12px; font-weight: 600; color: var(--muted); text-decoration: none; padding: 6px 10px; border-radius: 4px; }
.btn-back:hover { background: var(--bg); color: var(--action); }
.h-logo img { display: block; }
.h-divider { width: 1px; height: 18px; background: var(--border); }
.h-title { font-size: 13px; font-weight: 600; color: var(--label); flex: 1; }
.h-tabs { display: flex; gap: 4px; }
.h-tab { padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border); background: none; font-size: 13px; color: var(--label); cursor: pointer; transition: all .12s; white-space: nowrap; }
.h-tab.active { background: var(--action); color: var(--white); border-color: var(--action); font-weight: 600; }
.h-tab:hover:not(.active) { border-color: var(--action); color: var(--action); }
.btn-reset { padding: 7px 14px; background: none; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; color: var(--label); cursor: pointer; transition: all .12s; white-space: nowrap; }
.btn-reset:hover { border-color: #e53935; color: #e53935; }
.btn-save { padding: 7px 20px; background: var(--action); color: var(--white); border: none; border-radius: 4px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.btn-save:hover { opacity: .85; }
.btn-save:disabled { opacity: .6; cursor: not-allowed; }

/* ── メインレイアウト ── */
.main { flex: 1; display: flex; overflow: hidden; }

/* ── プレビュー ── */
.preview-pane { width: 50%; overflow: auto; background: #d8d8d8; padding: 20px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
#preview-page-wrap { transform-origin: top center; }
.a4-page { width: 794px; min-height: 1123px; background: var(--white); box-shadow: 0 2px 8px rgba(0,0,0,.18); }
.page-hbar { background: var(--main); color: var(--white); padding: 13px 32px; display: flex; justify-content: space-between; align-items: center; }
.phb-brand { font-size: 17px; font-weight: 800; letter-spacing: -.5px; }
.page-content { padding: 10px 32px 24px; }
.preview-inner { max-width: 760px; margin: 0; font-size: 11.5px; color: var(--label); line-height: 1.9; padding: 0 8px; }

/* ── エディタペイン ── */
.editor-pane { width: 50%; overflow-y: auto; padding: 16px 20px; background: var(--bg); border-left: 1px solid var(--border); }
.editor-head { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 12px; }

/* ── ブロックカード ── */
.block-card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
.block-card.dragging { opacity: .45; box-shadow: 0 6px 16px rgba(0,0,0,.18); }
.block-card.drag-over { border-color: var(--action); box-shadow: 0 0 0 2px rgba(63,50,119,.2); background: #faf9ff; }

/* カードヘッダー */
.bc-head { display: flex; align-items: center; gap: 8px; padding: 9px 12px; cursor: pointer; user-select: none; min-height: 40px; }
.bc-head:hover { background: #faf9ff; }
.block-special .bc-head,
.block-special .bc-head:hover { cursor: default; background: transparent; }

/* ドラッグハンドル */
.bc-drag { font-size: 18px; color: #ccc; cursor: grab; flex-shrink: 0; line-height: 1; padding: 1px 4px; border-radius: 3px; transition: color .1s; }
.bc-drag:hover { color: var(--action); background: #ede9f6; }

/* バッジ・プレビュー */
.bc-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; }
.bc-preview { flex: 1; font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.bc-arrow { font-size: 9px; color: var(--muted); flex-shrink: 0; padding: 0 2px; }
.btn-del { padding: 3px 9px; background: #ffeaea; color: #e53935; border: none; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
.btn-del:hover { opacity: .8; }

/* 特殊ブロック */
.block-special { background: #fafafa; }
.bc-special-tag { flex: 1; font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* カードボディ */
.bc-body { padding: 10px 12px 12px; border-top: 1px solid #f0f0f0; }
.bc-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bc-row-label { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.bc-field-label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 8px; }
.bc-field-label:first-child { margin-top: 0; }
.bc-style-sel { flex: 1; max-width: 190px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: inherit; background: var(--white); cursor: pointer; }
.bc-style-sel:focus { outline: none; border-color: var(--action); }
.bc-textarea { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: inherit; resize: vertical; min-height: 60px; line-height: 1.5; }
.bc-textarea:focus { outline: none; border-color: var(--action); }
.bc-space-sel { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: inherit; background: var(--white); cursor: pointer; }
.bc-space-sel:focus { outline: none; border-color: var(--action); }

/* ロックURL行 */
.bc-lock-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.bc-lock-icon { font-size: 13px; flex-shrink: 0; }
.bc-url-locked { flex: 1; padding: 5px 9px; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; font-family: inherit; background: #f5f5f5; color: var(--muted); cursor: not-allowed; }

/* ブロック追加ボタン */
.btn-add { width: 100%; padding: 11px; background: none; border: 1px dashed var(--border); border-radius: 6px; color: var(--label); font-size: 13px; cursor: pointer; transition: all .12s; margin-top: 4px; }
.btn-add:hover { border-color: var(--action); color: var(--action); background: #f7f6fb; }

/* トースト */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px); background: #1a1a1a; color: var(--white); padding: 11px 28px; border-radius: 6px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>

<div class="header">
  <a href="gaiheki-setting.html" class="btn-back" onclick="guardNav(event)">← 設定</a>
  <a href="gaiheki-setting.html" class="h-logo" onclick="guardNav(event)"><img src="gaiheki-logo.png" alt="gaiheki+" height="32"></a>
  <div class="h-divider"></div>
  <span class="h-title">ガイダンス資料エディタ</span>
  <div class="h-tabs">
    <button class="h-tab active" data-page="p2" onclick="switchPage('p2')">P2 写真のお願い</button>
    <button class="h-tab" data-page="p3" onclick="switchPage('p3')">P3 成約施策</button>
  </div>

<div class="main">
  <div class="preview-pane" id="preview-pane">
    <div id="preview-page-wrap">
      <div class="a4-page">
        <div class="page-hbar">
          <div class="phb-brand">gaiheki+</div>
          <div style="text-align:right;font-size:11px;opacity:.8">プレビュー</div>
        </div>
        <div class="page-content">
          <div class="preview-inner" id="preview-content"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="editor-pane">
    <div class="editor-head">ブロック一覧（ヘッダーをクリックして展開）</div>
    <div id="block-list"></div>
    <button class="btn-add" onclick="addBlock()">＋ ブロック追加</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── Business config ── */
var BIZ_ID        = 'gaiheki';
var BG_TEXT_BG    = '#e8e6f3';
var BG_TEXT_COLOR = '#3F3277';

/* ── Default blocks ── */
var DEFAULT_BLOCKS = {
  p2: [
    { id:'_p2_01', style:'title',    text:'現場・会社の写真ご提供のお願い' },
    { id:'_p2_02', style:'bg-text',  text:'実際に写真の掲載をお願いしている理由' },
    { id:'_p2_03', style:'body',     text:'・実際に成約率やアポ率が高くなるというデータが出ている\n・施工の丁寧さや雰囲気が伝わりやすく満足度が上がる\n・結果的に利益が伸びる' },
    { id:'_p2_04', style:'body',     text:'スマホ撮影の写真でも問題ありませんので、\n下記フォームより2〜5枚ほどご提供をお願いいたします。' },
    { id:'_p2_05', style:'url-photo',text:'▼写真アップロードフォーム' },
    { id:'_p2_06', style:'bold',     text:'【おすすめの写真例】' },
    { id:'_p2_07', style:'body',     text:'・施工中の様子（職人さんの手元や後ろ姿など）\n・会社外観や社内の様子\n・スタッフ集合写真、看板、車両など' },
    { id:'_p2_08', style:'images',   text:'' },
    { id:'_p2_09', style:'muted',    text:'※お送りいただいた素材は掲載前に確認のうえ、内容に問題のない範囲で使用いたします。' },
    { id:'_p2_10', style:'body',     text:'お手数おかけしてしまいますが、\nご協力のほど、どうぞよろしくお願いいたします。' },
    { id:'_p2_11', style:'url-store',text:'▼加盟店様の紹介ページ' },
    { id:'_p2_12', style:'bold',     text:'【管理画面へ追加で欲しい機能について】' },
    { id:'_p2_13', style:'body',     text:'普段、使っている機能や管理システム等が弊社管理画面にもあれば便利なのに！！\nのようなことがあればお願い致します！' }
  ],
  p3: [
    { id:'_p3_01', style:'title',   text:'＜現調 / 成約に繋げるための施策＞' },
    { id:'_p3_02', style:'bg-text', text:'【ローンについて】' },
    { id:'_p3_03', style:'body',    text:'**エンドユーザー様向けローン**を導入することとなりました。\n外壁・屋根工事は高額になりやすく、\n「金額で迷われる」「今は難しいと言われる」\nといった理由で失注してしまうケースも少なくありません。' },
    { id:'_p3_04', style:'body',    text:'ローンが利用可能になることで、\n・月々払いでのご提案が可能\n・予算で迷われているお客様の後押し\n・ワンランク上の工事提案がしやすくなる\n→ 結果として成約率向上が期待できます。' },
    { id:'_p3_05', style:'bold',    text:'【加盟店様の費用負担・手数料負担はございません。】' },
    { id:'_p3_06', style:'muted',   text:'※お客様にも所定の審査がございます。' },
    { id:'_p3_07', style:'body',    text:'導入をご希望の加盟店様は、\n下記資料をお目通しいただけますと幸いです。' },
    { id:'_p3_08',  style:'bold',           text:'【媒体資料】' },
    { id:'_p3_08u', style:'url-loan-media', text:'' },
    { id:'_p3_09',  style:'bold',           text:'【お申込書】' },
    { id:'_p3_09u', style:'url-loan-apply', text:'' },
    { id:'_p3_10', style:'bg-text', text:'【下記、弊社からお支払いをさせて頂きます！】' },
    { id:'_p3_11', style:'bold',    text:'アマギフ1000円　現地調査完了＆お見積書提示' },
    { id:'_p3_12',  style:'bold',     text:'現地調査完了・お見積書提示後の申請フォーム' },
    { id:'_p3_12u', style:'url-form1', text:'' },
    { id:'_p3_13', style:'bold',    text:'作業金額の1%のアマギフ　作業完了後' },
    { id:'_p3_14',  style:'bold',     text:'作業完了後の申請フォーム' },
    { id:'_p3_14u', style:'url-form2', text:'' },
    { id:'_p3_15', style:'bold',    text:'＜使い方＞' },
    { id:'_p3_16', style:'body',    text:'現地調査完了でAmazonギフト1000円分、作業完了でさらに金額の1％分のAmazonギフトをプレゼントさせていただきます。\nこれを営業トークのフックとして使っていただくことが可能なので、まずは現地見積もりにつなげるために「Amazonギフト券」をフックにして、現地見積もりのアポイントを打診してみてください。\nなお、Amazonギフト自体は弊社から直接お客様にお送りする形となります。' }
  ]
};

/* ── State ── */
var currentPage = 'p2';
var blocks      = { p2: [], p3: [] };
var db          = firebase.firestore();
var dragSrcIdx  = -1;
var expandedIds = {};   /* blockId -> true/false */
var isDirty = false;

function markDirty() { isDirty = true; }
function clearDirty() { isDirty = false; }

function guardNav(e) {
  if (!isDirty) return;
  if (!confirm('保存されていない変更があります。このページを離れますか？')) {
    e.preventDefault();
  }
}


/* ── Firestore ── */
function migrateBlocks(arr) {
  return (arr||[]).map(function(b) {
    if (b.style === 'link')      return Object.assign({}, b, { style:'body', text: b.url||b.text||'' });
    if (b.style === 'link-card') return Object.assign({}, b, { style:'bold', text: b.text||b.linkLabel||'' });
    if (b.style === 'url-ext')   return Object.assign({}, b, { style:'bold', url: undefined });
    return b;
  });
}

/* 必須ロックリンクブロックがなければ挿入 */
function ensureP3Blocks(arr) {
  var rules = [
    { style:'url-loan-media', block:{id:'_p3_08u',style:'url-loan-media',text:''}, afterId:'_p3_08',  afterText:'媒体資料' },
    { style:'url-loan-apply', block:{id:'_p3_09u',style:'url-loan-apply',text:''}, afterId:'_p3_09',  afterText:'お申込書' },
    { style:'url-form1',      block:{id:'_p3_12u',style:'url-form1',     text:''}, afterId:'_p3_12',  afterText:'現地調査完了' },
    { style:'url-form2',      block:{id:'_p3_14u',style:'url-form2',     text:''}, afterId:'_p3_14',  afterText:'作業完了後の申請フォーム' },
  ];
  rules.forEach(function(r) {
    if (arr.some(function(b){ return b.style===r.style; })) return;
    var idx = -1;
    for (var i=0; i<arr.length; i++) {
      if (arr[i].id===r.afterId || (r.afterText && arr[i].text && arr[i].text.indexOf(r.afterText)>=0)) { idx=i; break; }
    }
    if (idx>=0) arr.splice(idx+1, 0, JSON.parse(JSON.stringify(r.block)));
  });
  return arr;
}

function loadTemplate() {
  db.collection('templates').doc(BIZ_ID).get()
    .then(function(doc) {
      var def = JSON.parse(JSON.stringify(DEFAULT_BLOCKS));
      if (doc.exists && doc.data().blocks) {
        var s = doc.data().blocks;
        blocks = {
          p2: migrateBlocks((s.p2&&s.p2.length) ? s.p2 : def.p2),
          p3: ensureP3Blocks(migrateBlocks((s.p3&&s.p3.length) ? s.p3 : def.p3))
        };
      } else {
        blocks = def;
      }
      renderAll(); scalePreview();
    })
    .catch(function(e) {
      console.error('[Editor]', e.message);
      blocks = JSON.parse(JSON.stringify(DEFAULT_BLOCKS));
      renderAll(); scalePreview();
    });
}

function saveTemplate() {
  var btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '保存中...';
  db.collection('templates').doc(BIZ_ID).set({ blocks: blocks, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
    .then(function() { clearDirty(); showToast('保存しました'); btn.disabled = false; btn.textContent = '保存'; })
    .catch(function(e) { alert('保存に失敗: '+e.message); btn.disabled = false; btn.textContent = '保存'; });
}

function resetToDefault() {
  if (!confirm('デフォルト状態に戻しますか？（「保存」するまでFirestoreには反映されません）')) return;
  blocks = JSON.parse(JSON.stringify(DEFAULT_BLOCKS));
  expandedIds = {};
  renderAll();
}

/* ── Page switch ── */
function switchPage(page) {
  if (page === currentPage) return;
  if (isDirty && !confirm('保存されていない変更があります。このページを離れますか？')) return;
  currentPage = page;
  document.querySelectorAll('.h-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.page===page); });
  renderAll();
}

/* ── Render helpers ── */
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escId(s)   { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function processText(s) { return escHtml(s||'').replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>'); }

/* ── Preview render ── */
var SPACE_PX = { small:'16px', medium:'32px', large:'64px' };

function renderBlock(b) {
  var t = processText(b.text);
  switch (b.style) {
    case 'title':    return '<div style="font-size:20px;font-weight:700;color:#1a1a1a;margin-top:48px">'+t+'</div>';
    case 'body':     return '<div>'+t+'</div>';
    case 'bg-text':  return '<div><span style="display:inline-block;background:'+BG_TEXT_BG+';color:'+BG_TEXT_COLOR+';font-weight:700;padding:3px 10px;border-radius:3px">'+t+'</span></div>';
    case 'bold':     return '<div><strong>'+t+'</strong></div>';
    case 'muted':    return '<div style="color:#999;font-size:10.5px">'+t+'</div>';
    case 'space':    return '<div style="height:'+(SPACE_PX[b.spaceSize||'medium']||'32px')+'"></div>';
    case 'url-ext':     return '<div>'+processText(b.text)+'<br><a href="'+escHtml(b.url||'#')+'" style="color:'+BG_TEXT_COLOR+';word-break:break-all" target="_blank">'+escHtml(b.url||'')+'</a></div>';
    case 'link-locked':return '<div><a href="'+escHtml(b.url||'#')+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:#f1f3f4;border:1px solid #dadce0;border-radius:4px;padding:4px 12px;text-decoration:none;color:#1a1a1a;font-size:12px;font-weight:600">🔗 '+processText(b.text)+'</a></div>';
    case 'url-loan-media':{ var lm=b.text?processText(b.text)+'<br>':''; return '<div>'+lm+'<span style="color:'+BG_TEXT_COLOR+';font-size:11px">（ローン媒体資料URL・設定画面で変更）</span></div>'; }
    case 'url-loan-apply':{ var la=b.text?processText(b.text)+'<br>':''; return '<div>'+la+'<span style="color:'+BG_TEXT_COLOR+';font-size:11px">（ローン申込書URL・設定画面で変更）</span></div>'; }
    case 'url-form1':{ var f1=b.text?processText(b.text)+'<br>':''; return '<div>'+f1+'<span style="color:'+BG_TEXT_COLOR+';font-size:11px">（現調完了申請フォームURL・設定画面で変更）</span></div>'; }
    case 'url-form2':{ var f2=b.text?processText(b.text)+'<br>':''; return '<div>'+f2+'<span style="color:'+BG_TEXT_COLOR+';font-size:11px">（作業完了申請フォームURL・設定画面で変更）</span></div>'; }
    case 'url-photo':return '<div>'+processText(b.text||'▼写真アップロードフォーム')+'<br><span style="color:'+BG_TEXT_COLOR+';font-size:11px">（写真アップロードURL・設定画面で変更）</span></div>';
    case 'url-store':return '<div>'+processText(b.text||'▼加盟店様の紹介ページ')+'<br><span style="color:'+BG_TEXT_COLOR+';font-size:11px">（加盟店紹介URL・設定画面で変更）</span></div>';
    case 'images':   return '<div style="display:flex;gap:8px"><div style="flex:1;aspect-ratio:4/3;border-radius:6px;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:10px;color:#aaa">写真1</div><div style="flex:1;aspect-ratio:4/3;border-radius:6px;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:10px;color:#aaa">写真2</div><div style="flex:1;aspect-ratio:4/3;border-radius:6px;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:10px;color:#aaa">写真3</div></div>';
    default:         return '<div>'+t+'</div>';
  }
}

function renderPreview() {
  var el = document.getElementById('preview-content');
  if (el) el.innerHTML = (blocks[currentPage]||[]).map(renderBlock).join('');
}

/* ── Editor card builder ── */
var FULLY_LOCKED = { 'images': '🔒 写真サンプル画像（3枚）' };

var SEMI_LOCKED = {
  'url-photo':      '写真URL（🔒）',
  'url-store':      '店舗URL（🔒）',
  'url-loan-media': 'ローン媒体資料URL（🔒）',
  'url-loan-apply': 'ローン申込書URL（🔒）',
  'url-form1':      'フォームURL-1（🔒）',
  'url-form2':      'フォームURL-2（🔒）'
};
/* ロック解除不可スタイル（削除ボタン非表示） */
var NO_DELETE_STYLES = ['url-loan-media','url-loan-apply','url-form1','url-form2'];
var SEMI_URL_LABEL = {
  'url-photo':      '写真アップロードURL（設定画面のURL設定で変更）',
  'url-store':      '加盟店紹介URL（設定画面のURL設定で変更）',
  'url-loan-media': 'ローン媒体資料URL（設定画面のURL設定で変更）',
  'url-loan-apply': 'ローン申込書URL（設定画面のURL設定で変更）',
  'url-form1':      '現調完了申請フォームURL（設定画面のURL設定で変更）',
  'url-form2':      '作業完了申請フォームURL（設定画面のURL設定で変更）'
};

var STYLE_OPTS = [
  ['title','タイトル'],['body','本文'],['bg-text','背景ありテキスト'],
  ['bold','太字'],['muted','補足テキスト'],['space','余白']
];
var STYLE_LABEL = { title:'タイトル', body:'本文', 'bg-text':'背景ありテキスト', bold:'太字', muted:'補足テキスト', space:'余白' };
var SPACE_LABEL  = { small:'小（16px）', medium:'中（32px）', large:'大（64px）' };

function badgeStyle(s) {
  if (s==='title'||s==='bg-text') return 'background:'+BG_TEXT_BG+';color:'+BG_TEXT_COLOR;
  if (s==='bold')  return 'background:#2d2d2d;color:#fff';
  if (s==='muted') return 'background:#ebebeb;color:#999';
  if (s==='space')        return 'background:#e8f5e9;color:#2e7d32';
  if (s==='url-ext')    return 'background:#e3f2fd;color:#1565c0';
  if (s==='url-form1'||s==='url-form2') return 'background:#e3f2fd;color:#1565c0';
  if (s==='link-locked') return 'background:#e3f2fd;color:#1565c0';
  return 'background:#f0f0f0;color:#555';
}

function buildCard(b, idx) {
  var bid = escId(b.id);
  var expanded = !!expandedIds[b.id];
  var arrow    = '<span class="bc-arrow">'+(expanded?'▼':'▶')+'</span>';
  var del      = '<button class="btn-del" onclick="event.stopPropagation();delBlock('+idx+')">削除</button>';

  /* ドラッグハンドル（≡自身がdraggable） */
  var handle = '<span class="bc-drag" draggable="true" data-idx="'+idx+'"'
    +' ondragstart="startDrag(event)" ondragend="endDrag(event)"'
    +' onclick="event.stopPropagation()" title="ドラッグで並び替え">≡</span>';

  /* カード共通DnD属性 */
  var cardDnd = ' data-idx="'+idx+'" data-blockid="'+escHtml(b.id)+'"'
    +' ondragover="overDrag(event)" ondrop="dropDrag(event)" ondragleave="leaveDrag(event)"';

  /* 完全ロック（images） */
  if (FULLY_LOCKED.hasOwnProperty(b.style)) {
    return '<div class="block-card block-special"'+cardDnd+'>'
      +'<div class="bc-head">'+handle
      +'<span class="bc-special-tag">'+FULLY_LOCKED[b.style]+'</span>'+del
      +'</div></div>';
  }

  /* 半ロック（url-photo / url-store）: ラベル編集可・URL固定 */
  if (SEMI_LOCKED.hasOwnProperty(b.style)) {
    var slLabel = SEMI_LOCKED[b.style];
    var slBadge = '<span class="bc-badge" style="background:#fff3e0;color:#e65100">'+slLabel+'</span>';
    var noDel   = NO_DELETE_STYLES.indexOf(b.style) >= 0;
    var slPre   = (b.text||'').replace(/\n/g,' ');
    slPre = slPre.length > 44 ? slPre.substring(0,44)+'…' : slPre;
    var bodyH   = expanded ? '' : ' style="display:none"';
    return '<div class="block-card"'+cardDnd+'>'
      +'<div class="bc-head" onclick="toggleCard(\''+bid+'\')">'
      +handle+slBadge+'<span class="bc-preview">'+escHtml(slPre)+'</span>'+arrow+(noDel?'':del)
      +'</div>'
      +'<div class="bc-body"'+bodyH+'>'
      +'<span class="bc-field-label">ラベルテキスト</span>'
      +'<textarea class="bc-textarea" rows="2" placeholder="リンクのラベルテキスト" data-idx="'+idx+'" data-field="text" oninput="updateBlock(this)">'+escHtml(b.text||'')+'</textarea>'
      +'<div class="bc-lock-row"><span class="bc-lock-icon">🔒</span><input class="bc-url-locked" type="text" value="'+escHtml(SEMI_URL_LABEL[b.style])+'" disabled></div>'
      +'</div>'
      +'</div>';
  }

  /* 外部URLブロック（url-ext）: テキスト編集可・URL固定・P2 url-photo形式 */
  if (b.style === 'url-ext') {
    var uePre = (b.text||'').replace(/\n/g,' ');
    uePre = uePre.length > 44 ? uePre.substring(0,44)+'…' : uePre;
    var bodyH = expanded ? '' : ' style="display:none"';
    return '<div class="block-card"'+cardDnd+'>'
      +'<div class="bc-head" onclick="toggleCard(\'' +bid+ '\')">'
      +handle+'<span class="bc-badge" style="background:#e3f2fd;color:#1565c0">🔗 外部URL</span>'
      +'<span class="bc-preview">'+escHtml(uePre)+'</span>'+arrow+del
      +'</div>'
      +'<div class="bc-body"'+bodyH+'>'
      +'<span class="bc-field-label">表示テキスト</span>'
      +'<textarea class="bc-textarea" rows="2" placeholder="リンクラベルテキスト" data-idx="'+idx+'" data-field="text" oninput="updateBlock(this)">'+escHtml(b.text||'')+'</textarea>'
      +'<div class="bc-lock-row"><span class="bc-lock-icon">🔒</span><input class="bc-url-locked" type="text" value="'+escHtml(b.url||'')+'" disabled></div>'
      +'</div>'
      +'</div>';
  }

  /* ロックリンクブロック（link-locked）: テキスト編集可・URL固定 */
  if (b.style === 'link-locked') {
    var llPre = (b.text||'').replace(/\n/g,' ');
    llPre = llPre.length > 44 ? llPre.substring(0,44)+'…' : llPre;
    var bodyH = expanded ? '' : ' style="display:none"';
    return '<div class="block-card"'+cardDnd+'>'
      +'<div class="bc-head" onclick="toggleCard(\''+bid+'\')">'
      +handle+'<span class="bc-badge" style="background:#e3f2fd;color:#1565c0">🔗 リンク</span>'
      +'<span class="bc-preview">'+escHtml(llPre)+'</span>'+arrow+del
      +'</div>'
      +'<div class="bc-body"'+bodyH+'>'
      +'<span class="bc-field-label">表示テキスト</span>'
      +'<textarea class="bc-textarea" rows="2" placeholder="リンクの表示テキスト" data-idx="'+idx+'" data-field="text" oninput="updateBlock(this)">'+escHtml(b.text||'')+'</textarea>'
      +'<div class="bc-lock-row"><span class="bc-lock-icon">🔒</span><input class="bc-url-locked" type="text" value="'+escHtml(b.url||'')+'" disabled></div>'
      +'</div>'
      +'</div>';
  }

  /* 通常ブロック */
  var label  = STYLE_LABEL[b.style] || b.style;
  var badge  = '<span class="bc-badge" style="'+badgeStyle(b.style)+'">'+label+'</span>';
  var rawPre = b.style==='space'
    ? (SPACE_LABEL[b.spaceSize||'medium']||'')
    : (b.text||'').replace(/\n/g,' ').replace(/\*\*/g,'');
  rawPre = rawPre.length > 44 ? rawPre.substring(0,44)+'…' : rawPre;
  var bodyH = expanded ? '' : ' style="display:none"';

  var opts = STYLE_OPTS.map(function(o){
    return '<option value="'+o[0]+'"'+(b.style===o[0]?' selected':'')+'>'+o[1]+'</option>';
  }).join('');
  var styleRow = '<div class="bc-row"><span class="bc-row-label">スタイル</span>'
    +'<select class="bc-style-sel" data-idx="'+idx+'" onchange="updateStyle(this)">'+opts+'</select></div>';

  var bodyContent = (b.style==='space')
    ? '<div class="bc-row"><span class="bc-row-label">サイズ</span>'
      +'<select class="bc-space-sel" data-idx="'+idx+'" data-field="spaceSize" onchange="updateBlock(this)">'
      +['small','medium','large'].map(function(sz){
        return '<option value="'+sz+'"'+((b.spaceSize||'medium')===sz?' selected':'')+'>'+SPACE_LABEL[sz]+'</option>';
      }).join('')+'</select></div>'
    : '<textarea class="bc-textarea" rows="3" placeholder="テキスト内容（Enterで改行・**テキスト**で太字）" data-idx="'+idx+'" data-field="text" oninput="updateBlock(this)">'+escHtml(b.text||'')+'</textarea>';

  return '<div class="block-card"'+cardDnd+'>'
    +'<div class="bc-head" onclick="toggleCard(\''+bid+'\')">'
    +handle+badge+'<span class="bc-preview">'+escHtml(rawPre)+'</span>'+arrow+del
    +'</div>'
    +'<div class="bc-body"'+bodyH+'>'+styleRow+bodyContent+'</div>'
    +'</div>';
}

function renderEditor() {
  var list = document.getElementById('block-list');
  if (!list) return;
  var arr = blocks[currentPage]||[];
  list.innerHTML = arr.map(function(b,i){ return buildCard(b,i); }).join('');
}

function renderAll() { renderPreview(); renderEditor(); }

/* ── Toggle collapse ── */
function toggleCard(blockId) {
  expandedIds[blockId] = !expandedIds[blockId];
  var card = document.querySelector('.block-card[data-blockid="'+blockId+'"]');
  if (!card) return;
  var body  = card.querySelector('.bc-body');
  var arrow = card.querySelector('.bc-arrow');
  if (body)  body.style.display  = expandedIds[blockId] ? '' : 'none';
  if (arrow) arrow.textContent   = expandedIds[blockId] ? '▼' : '▶';
}

/* ── Update handlers ── */
function updateStyle(sel) {
  markDirty();
  var idx = parseInt(sel.dataset.idx);
  blocks[currentPage][idx].style = sel.value;
  if (sel.value==='space' && !blocks[currentPage][idx].spaceSize) blocks[currentPage][idx].spaceSize = 'medium';
  renderAll();
}

function updateBlock(inp) {
  markDirty();
  var idx = parseInt(inp.dataset.idx);
  blocks[currentPage][idx][inp.dataset.field] = inp.value;
  renderPreview();
  /* ヘッダーのプレビューテキストだけ差し替え（フォーカスを失わないよう最小更新） */
  var card = document.querySelector('#block-list .block-card[data-idx="'+idx+'"]');
  if (card) {
    var pre = card.querySelector('.bc-preview');
    if (pre) {
      var b = blocks[currentPage][idx];
      var raw = b.style==='space'
        ? (SPACE_LABEL[b.spaceSize||'medium']||'')
        : (b.text||'').replace(/\n/g,' ').replace(/\*\*/g,'');
      pre.textContent = raw.length > 44 ? raw.substring(0,44)+'…' : raw;
    }
  }
}

function delBlock(idx) {
  if (!confirm('このブロックを削除しますか？')) return;
  markDirty();
  blocks[currentPage].splice(idx,1);
  renderAll();
}

function addBlock() {
  markDirty();
  var nb = { id:'new_'+Date.now(), style:'body', text:'' };
  blocks[currentPage].push(nb);
  expandedIds[nb.id] = true;   /* 追加時は展開状態 */
  renderAll();
  setTimeout(function() {
    var last = document.querySelector('#block-list .block-card:last-child');
    if (last) last.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 60);
}

/* ── Drag & Drop ── */
function startDrag(e) {
  /* ≡ハンドル自身がdraggable="true"なので、e.currentTargetは≡span */
  dragSrcIdx = parseInt(e.currentTarget.dataset.idx);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(dragSrcIdx));
  /* ドラッグイメージをカード全体に */
  var card = e.currentTarget.closest ? e.currentTarget.closest('.block-card') : null;
  if (card) {
    try { e.dataTransfer.setDragImage(card, 20, 12); } catch(ex) {}
    setTimeout(function() { card.classList.add('dragging'); }, 0);
  }
}

function overDrag(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var ti = parseInt(e.currentTarget.dataset.idx);
  document.querySelectorAll('#block-list .block-card').forEach(function(c) {
    c.classList.toggle('drag-over', parseInt(c.dataset.idx)===ti && ti!==dragSrcIdx);
  });
}

function dropDrag(e) {
  e.preventDefault();
  var ti = parseInt(e.currentTarget.dataset.idx);
  if (dragSrcIdx < 0 || dragSrcIdx === ti) { dragSrcIdx = -1; return; }
  markDirty();
  var arr   = blocks[currentPage];
  var moved = arr.splice(dragSrcIdx, 1)[0];
  arr.splice(ti > dragSrcIdx ? ti - 1 : ti, 0, moved);
  dragSrcIdx = -1;
  renderAll();
}

function endDrag(e) {
  dragSrcIdx = -1;
  document.querySelectorAll('#block-list .block-card').forEach(function(c) {
    c.classList.remove('dragging','drag-over');
  });
}

function leaveDrag(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over');
}

/* ── Preview scale ── */
function scalePreview() {
  var pane = document.getElementById('preview-pane');
  var wrap = document.getElementById('preview-page-wrap');
  if (!pane||!wrap) return;
  var s = Math.min(1, Math.max(0.3, (pane.clientWidth-40)/794));
  wrap.style.transform = 'scale('+s+')';
  wrap.style.transformOrigin = 'top center';
  wrap.style.marginBottom = (Math.round(1200*s)-1200+20)+'px';
}
window.addEventListener('beforeunload', function(e) {
  if (!isDirty) return;
  e.preventDefault();
  e.returnValue = '';
});
window.addEventListener('resize', scalePreview);

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

loadTemplate();
</script>
