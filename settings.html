<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gaiheki+ 設定</title>
<style>
:root {
  --main:   #3F3277;
  --accent: #F07200;
  --bg:     #F3F3F3;
  --text:   #1a1a1a;
  --white:  #ffffff;
  --border: #dcdcdc;
  --label:  #555555;
  --muted:  #999999;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

/* ── ヘッダー ── */
.header {
  background: var(--white); border-bottom: 1px solid var(--border);
  height: 56px; display: flex; align-items: center; padding: 0 24px; gap: 12px;
  position: sticky; top: 0; z-index: 10;
}
.header-logo, a.header-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; text-decoration: none; color: var(--text); }
a.header-logo:hover { opacity: 0.8; }
.header-logo span { color: var(--main); }
.header-divider { width: 1px; height: 18px; background: var(--border); }
.header-title { font-size: 14px; font-weight: 600; color: var(--label); flex: 1; }
.btn-back { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; font-size: 16px; color: var(--muted); text-decoration: none; border-radius: 4px; transition: background .12s, color .12s; }
.btn-back:hover { background: var(--bg); color: var(--main); }
.btn-save {
  padding: 8px 20px; background: var(--main); color: var(--white);
  border: none; border-radius: 4px; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .12s;
}
.btn-save:hover { opacity: .85; }

/* ── レイアウト ── */
.body { display: flex; height: calc(100vh - 56px); overflow: hidden; }

/* ── サイドナビ ── */
.sidenav { width: 200px; background: var(--white); border-right: 1px solid var(--border); padding: 16px 0; flex-shrink: 0; overflow-y: auto; }
.sidenav-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 0 20px 6px; }
.sidenav-item {
  display: block; width: 100%; padding: 10px 20px;
  font-size: 13px; color: var(--label); background: none; border: none;
  border-left: 3px solid transparent; text-align: left; cursor: pointer;
  transition: color .12s, border-color .12s; margin-bottom: 1px;
}
.sidenav-item:hover { color: var(--main); }
.sidenav-item.active { color: var(--main); border-left-color: var(--main); font-weight: 600; }

/* ── メインコンテンツ ── */
.main { flex: 1; overflow-y: auto; padding: 28px 36px 40px; }
.section { display: none; max-width: 860px; }
.section.active { display: block; }
.section-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.section-desc { font-size: 12px; color: var(--muted); margin-bottom: 24px; }

/* ── プランカード ── */
.plan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.plan-card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; padding: 18px; }
.plan-card-head {
  font-size: 13px; font-weight: 700; color: var(--main);
  padding-bottom: 10px; margin-bottom: 14px;
  border-bottom: 2px solid var(--main);
}

/* ── フィールド ── */
.field { margin-bottom: 13px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--label); margin-bottom: 4px; }
.field input, .field textarea {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border);
  border-radius: 4px; font-size: 12px; background: var(--white);
  color: var(--text); font-family: inherit; transition: border-color .12s;
}
.field input:focus, .field textarea:focus { outline: none; border-color: var(--main); }
.field textarea { resize: vertical; min-height: 90px; line-height: 1.65; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── 担当者リスト ── */
.staff-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 8px; }
.staff-tag {
  display: flex; align-items: center; gap: 6px;
  background: #eeecf8; color: var(--main);
  border-radius: 4px; padding: 5px 12px; font-size: 13px; font-weight: 500;
}
.staff-tag button {
  background: none; border: none; color: var(--main);
  cursor: pointer; font-size: 16px; line-height: 1; padding: 0; opacity: .5;
}
.staff-tag button:hover { opacity: 1; }
.staff-add { display: flex; gap: 8px; }
.staff-add input {
  flex: 1; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: 4px; font-size: 13px; font-family: inherit;
}
.staff-add input:focus { outline: none; border-color: var(--main); }
.staff-add button {
  padding: 8px 18px; background: var(--main); color: var(--white);
  border: none; border-radius: 4px; font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap; transition: opacity .12s;
}
.staff-add button:hover { opacity: .85; }

/* ── URLグリッド ── */
.url-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── トースト ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
  background: #1a1a1a; color: var(--white); padding: 11px 28px; border-radius: 6px;
  font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .25s, transform .25s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <a href="index.html" class="header-logo">gaiheki<span>+</span></a>
  <div class="header-divider"></div>
  <div class="header-title">設定</div>
  <a href="index.html" class="btn-back" title="一覧へ戻る">←</a>
  <button class="btn-save" onclick="saveSettings()">保存</button>
</div>

<div class="body">

  <!-- サイドナビ -->
  <div class="sidenav">
    <div class="sidenav-label">設定項目</div>
    <button class="sidenav-item active" onclick="showSection('plan', this)">📋 プラン設定</button>
    <button class="sidenav-item" onclick="showSection('staff', this)">👤 担当者設定</button>
    <button class="sidenav-item" onclick="showSection('text', this)">📝 テキスト設定</button>
    <button class="sidenav-item" onclick="showSection('url', this)">🔗 URL設定</button>
  </div>

  <!-- メインコンテンツ -->
  <div class="main">

    <!-- ── プラン設定 ── -->
    <div class="section active" id="sec-plan">
      <div class="section-title">プラン設定</div>
      <div class="section-desc">各プランの月額・手数料・件数を設定します。資料作成時のデフォルト値として使用されます。</div>
      <div class="plan-grid">

        <div class="plan-card">
          <div class="plan-card-head">ライト</div>
          <div class="field"><label>月額費用（継続特典後・税抜）</label><input type="text" id="light-fee" placeholder="8万円"></div>
          <div class="field"><label>成約手数料</label><input type="text" id="light-commission" placeholder="10%"></div>
          <div class="field"><label>最低補償件数</label><input type="text" id="light-guarantee" placeholder="なし"></div>
          <div class="field"><label>月間紹介件数（想定）</label><input type="text" id="light-monthly" placeholder="25〜35件"></div>
          <div class="field"><label>契約期間</label><input type="text" id="light-contract-period" placeholder="なし"></div>
          <div class="field"><label>6ヶ月紹介件数（想定）</label><input type="text" id="light-half" placeholder="—"></div>
        </div>

        <div class="plan-card">
          <div class="plan-card-head">ベーシック</div>
          <div class="field"><label>月額費用（継続特典後・税抜）</label><input type="text" id="basic-fee" placeholder="10万円"></div>
          <div class="field"><label>成約手数料</label><input type="text" id="basic-commission" placeholder="5%"></div>
          <div class="field"><label>最低補償件数</label><input type="text" id="basic-guarantee" placeholder="25件"></div>
          <div class="field"><label>月間紹介件数（想定）</label><input type="text" id="basic-monthly" placeholder="40〜55件"></div>
          <div class="field"><label>契約期間</label><input type="text" id="basic-contract-period" placeholder="6ヶ月契約"></div>
          <div class="field"><label>6ヶ月紹介件数（想定）</label><input type="text" id="basic-half" placeholder="40〜55件"></div>
        </div>

        <div class="plan-card">
          <div class="plan-card-head">プロ</div>
          <div class="field"><label>月額費用（継続特典後・税抜）</label><input type="text" id="pro-fee" placeholder="15万円"></div>
          <div class="field"><label>成約手数料</label><input type="text" id="pro-commission" placeholder="3%"></div>
          <div class="field"><label>最低補償件数</label><input type="text" id="pro-guarantee" placeholder="40件"></div>
          <div class="field"><label>月間紹介件数（想定）</label><input type="text" id="pro-monthly" placeholder="65〜80件"></div>
          <div class="field"><label>契約期間</label><input type="text" id="pro-contract-period" placeholder="6ヶ月契約"></div>
          <div class="field"><label>6ヶ月紹介件数（想定）</label><input type="text" id="pro-half" placeholder="65〜80件"></div>
        </div>

      </div>
    </div>

    <!-- ── 担当者設定 ── -->
    <div class="section" id="sec-staff">
      <div class="section-title">担当者設定</div>
      <div class="section-desc">資料作成時の「担当者」ドロップダウンとトップページのフィルターに反映されます。</div>
      <div class="staff-tags" id="staff-tags"></div>
      <div class="staff-add">
        <input type="text" id="new-staff" placeholder="担当者名を入力" onkeydown="if(event.key==='Enter')addStaff()">
        <button onclick="addStaff()">追加</button>
      </div>
    </div>

    <!-- ── テキスト設定 ── -->
    <div class="section" id="sec-text">
      <div class="section-title">テキスト設定</div>
      <div class="section-desc">資料内の固定文言をカスタマイズできます。</div>
      <div class="field">
        <label>④ 休業日の文言</label>
        <textarea id="holiday-text" rows="4"></textarea>
      </div>
      <div class="field">
        <label>⑤ 除外情報の文言</label>
        <textarea id="exclude-text" rows="7"></textarea>
      </div>
    </div>

    <!-- ── URL設定 ── -->
    <div class="section" id="sec-url">
      <div class="section-title">URL設定</div>
      <div class="section-desc">資料作成時にフォームへ自動入力されるデフォルトURLです。</div>
      <div class="url-grid">
        <div class="field"><label>ログイン管理画面URL</label><input type="text" id="login-url" placeholder="https://business.gaihekiplus.com/sign_in"></div>
        <div class="field"><label>ローン媒体資料URL</label><input type="text" id="loan-doc-url" placeholder="Googleドライブ等のURL"></div>
        <div class="field"><label>ローン申込書URL</label><input type="text" id="loan-apply-url" placeholder="Googleドライブ等のURL"></div>
        <div class="field"><label>現調完了ギフト申請フォームURL</label><input type="text" id="gift-survey-url" placeholder="申請フォームURL"></div>
        <div class="field"><label>作業完了ギフト申請フォームURL</label><input type="text" id="gift-work-url" placeholder="申請フォームURL"></div>
        <div class="field"><label>写真アップロードフォームURL</label><input type="text" id="photo-url" placeholder="GoogleフォームのURL等"></div>
        <div class="field"><label>加盟店紹介ページURL</label><input type="text" id="store-page-url" placeholder="https://gaihekiplus.com/store/..."></div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /body -->

<div class="toast" id="toast">設定を保存しました</div>

<script>
const DEFAULT_SETTINGS = {
  plans: {
    light: { fee: '8万円',  commission: '10%', guarantee: 'なし', monthly: '25〜35件', half: '—', contractPeriod: '6ヶ月契約' },
    basic: { fee: '10万円', commission: '5%',  guarantee: '25件',  monthly: '40〜55件', half: '40〜55件', contractPeriod: '6ヶ月契約' },
    pro:   { fee: '15万円', commission: '3%',  guarantee: '40件',  monthly: '65〜80件', half: '65〜80件', contractPeriod: '6ヶ月契約' },
  },
  holidayText: '弊社は基本的にカレンダー通りの営業となるため、土日祝日は営業しておりません。\n配信内容の変更等を含め、ご連絡は平日 09:00〜19:00 の間にお願いいたします。',
  excludeText: '以下に該当するお客様情報はカウント対象外となります。\n\n・30日以内の、同一人物からの重複申込\n・使用されていない電話番号\n・別人の人 (ex 山田太郎)\n\n上記にあてはまるお客様情報については、お手数ですが私までご報告ください。',
  staffList: ['恩田雅史', '鈴木宏午', '皆川進太', '中村元彌', '松本そよ', '穴澤萌花', '亀井翼', '染葉健介', '杉本山東'],
  loanDocUrl: '', loanApplyUrl: '', giftSurveyUrl: '', giftWorkUrl: '', photoUrl: '', storePageUrl: '', loginUrl: 'https://business.gaihekiplus.com/sign_in',
};

function getSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('gaiheki_settings') || 'null');
    if (!s) return JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    return {
      ...DEFAULT_SETTINGS, ...s,
      plans: {
        light: { ...DEFAULT_SETTINGS.plans.light, ...(s.plans?.light || {}) },
        basic: { ...DEFAULT_SETTINGS.plans.basic, ...(s.plans?.basic || {}) },
        pro:   { ...DEFAULT_SETTINGS.plans.pro,   ...(s.plans?.pro   || {}) },
      },
      staffList: s.staffList?.length ? s.staffList : DEFAULT_SETTINGS.staffList,
    };
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_SETTINGS)); }
}

let staffList = [];

function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.sidenav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
}

function renderStaffTags() {
  document.getElementById('staff-tags').innerHTML = staffList.map((name, i) =>
    `<div class="staff-tag">${escHtml(name)}<button onclick="removeStaff(${i})" title="削除">×</button></div>`
  ).join('');
}

function addStaff() {
  const inp = document.getElementById('new-staff');
  const name = inp.value.trim();
  if (!name) return;
  if (staffList.includes(name)) { inp.value = ''; return; }
  staffList.push(name);
  inp.value = '';
  renderStaffTags();
}

function removeStaff(i) {
  staffList.splice(i, 1);
  renderStaffTags();
}

function saveSettings() {
  const plans = {};
  ['light', 'basic', 'pro'].forEach(p => {
    const get = id => document.getElementById(`${p}-${id}`).value.trim();
    plans[p] = {
      fee:            get('fee')             || DEFAULT_SETTINGS.plans[p].fee,
      commission:     get('commission')      || DEFAULT_SETTINGS.plans[p].commission,
      guarantee:      get('guarantee')       || DEFAULT_SETTINGS.plans[p].guarantee,
      monthly:        get('monthly')         || DEFAULT_SETTINGS.plans[p].monthly,
      half:           get('half')            || DEFAULT_SETTINGS.plans[p].half,
      contractPeriod: get('contract-period') || DEFAULT_SETTINGS.plans[p].contractPeriod,
    };
  });

  const settings = {
    plans,
    holidayText:   document.getElementById('holiday-text').value   || DEFAULT_SETTINGS.holidayText,
    excludeText:   document.getElementById('exclude-text').value   || DEFAULT_SETTINGS.excludeText,
    staffList:     [...staffList],
    loanDocUrl:    document.getElementById('loan-doc-url').value.trim(),
    loanApplyUrl:  document.getElementById('loan-apply-url').value.trim(),
    giftSurveyUrl: document.getElementById('gift-survey-url').value.trim(),
    giftWorkUrl:   document.getElementById('gift-work-url').value.trim(),
    photoUrl:      document.getElementById('photo-url').value.trim(),
    storePageUrl:  document.getElementById('store-page-url').value.trim(),
    loginUrl:      document.getElementById('login-url').value.trim() || DEFAULT_SETTINGS.loginUrl,
  };

  localStorage.setItem('gaiheki_settings', JSON.stringify(settings));

  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── 初期化 ── */
(function() {
  const s = getSettings();

  ['light', 'basic', 'pro'].forEach(p => {
    document.getElementById(`${p}-fee`).value             = s.plans[p].fee;
    document.getElementById(`${p}-commission`).value      = s.plans[p].commission;
    document.getElementById(`${p}-guarantee`).value       = s.plans[p].guarantee;
    document.getElementById(`${p}-monthly`).value         = s.plans[p].monthly;
    document.getElementById(`${p}-half`).value            = s.plans[p].half;
    document.getElementById(`${p}-contract-period`).value = s.plans[p].contractPeriod;
  });

  staffList = [...s.staffList];
  renderStaffTags();

  document.getElementById('holiday-text').value   = s.holidayText;
  document.getElementById('exclude-text').value   = s.excludeText;
  document.getElementById('loan-doc-url').value   = s.loanDocUrl;
  document.getElementById('loan-apply-url').value = s.loanApplyUrl;
  document.getElementById('gift-survey-url').value= s.giftSurveyUrl;
  document.getElementById('gift-work-url').value  = s.giftWorkUrl;
  document.getElementById('photo-url').value      = s.photoUrl;
  document.getElementById('store-page-url').value = s.storePageUrl;
  document.getElementById('login-url').value      = s.loginUrl;
})();
</script>
</body>
</html>
