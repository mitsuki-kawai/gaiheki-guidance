<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gaiheki+ ガイダンス一覧</title>
<style>
:root {
  --purple: #7c5cbf;
  --purple-light: #f0ebff;
  --purple-mid: #c5aff0;
  --green: #3db87a;
  --green-light: #eafaf2;
  --gray-bg: #f5f4f1;
  --gray-border: #e2e0db;
  --gray-text: #999;
  --dark: #1a1a1a;
  --mid: #555;
  --white: #fff;
  --sidebar-w: 200px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--gray-bg);color:var(--dark);font-size:14px;line-height:1.6}

/* ── レイアウト ── */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}

/* ── ヘッダー ── */
.header{grid-column:1/-1;background:var(--white);border-bottom:1px solid var(--gray-border);display:flex;align-items:center;padding:0 24px;gap:16px}
.header-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;margin-right:auto}
.header-logo span{color:var(--purple)}
.header-logo .sub{font-size:10px;color:var(--gray-text);font-weight:400;margin-left:6px;letter-spacing:0}
.btn-new{display:flex;align-items:center;gap:5px;padding:8px 16px;background:var(--purple);color:var(--white);border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:background 0.13s}
.btn-new:hover{background:#6b4daf}

/* ── 左サイドバー ── */
.sidebar{background:var(--white);border-right:1px solid var(--gray-border);overflow-y:auto;padding:16px 10px}
.sidebar-section{font-size:9px;font-weight:700;letter-spacing:0.08em;color:var(--gray-text);padding:6px 8px 4px;text-transform:uppercase}
.filter-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 10px;border-radius:6px;border:none;background:none;font-size:13px;font-weight:500;color:var(--mid);cursor:pointer;text-align:left;margin-bottom:2px;transition:all 0.12s}
.filter-item:hover{background:var(--gray-bg)}
.filter-item.active{background:var(--purple-light);color:var(--purple);font-weight:700}
.filter-count{font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;background:var(--gray-bg);color:var(--gray-text)}
.filter-item.active .filter-count{background:var(--purple);color:var(--white)}

/* ── メインエリア ── */
.main{overflow-y:auto;padding:24px}
.main-bar{display:flex;align-items:center;margin-bottom:20px;gap:12px}
.main-title{font-size:15px;font-weight:700}
.total-badge{font-size:11px;color:var(--gray-text);font-weight:400}

/* ── カードグリッド ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

.card{background:var(--white);border-radius:10px;border:1px solid var(--gray-border);padding:16px 18px;cursor:pointer;transition:all 0.15s;text-decoration:none;color:inherit;display:block}
.card:hover{border-color:var(--purple-mid);box-shadow:0 4px 14px rgba(124,92,191,0.12);transform:translateY(-1px)}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.card-company{font-size:14px;font-weight:700;line-height:1.4;flex:1;margin-right:8px}
.card-plan{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.card-plan.light{background:#fff3e0;color:#e65100}
.card-plan.basic{background:var(--purple-light);color:var(--purple)}
.card-plan.pro{background:var(--green-light);color:var(--green)}

.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-assignee{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--purple);background:var(--purple-light);padding:2px 8px;border-radius:4px}
.card-date{font-size:11px;color:var(--gray-text);margin-left:auto}

.card-footer{margin-top:10px;padding-top:10px;border-top:1px solid var(--gray-border);display:flex;align-items:center;justify-content:space-between}
.card-areas{font-size:11px;color:var(--mid);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;margin-right:8px}
.card-delete{background:none;border:none;font-size:11px;color:var(--gray-text);cursor:pointer;padding:2px 6px;border-radius:4px;transition:all 0.12s;flex-shrink:0}
.card-delete:hover{background:#fff0f0;color:#e53935}

/* ── 空状態 ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:360px;color:var(--gray-text);gap:12px}
.empty-icon{font-size:48px;opacity:0.4}
.empty-text{font-size:14px;font-weight:500}
.empty-sub{font-size:12px}
.btn-new-empty{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:10px 20px;background:var(--purple);color:var(--white);border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:background 0.13s}
.btn-new-empty:hover{background:#6b4daf}
</style>
</head>
<body>
<div class="app">

<!-- ── ヘッダー ── -->
<div class="header">
  <div class="header-logo">
    gaiheki<span>+</span>
    <span class="sub">初回ガイダンス管理</span>
  </div>
  <button class="btn-new" onclick="goToCreate()">＋ 新規作成</button>
</div>

<!-- ── 左サイドバー ── -->
<div class="sidebar">
  <div class="sidebar-section">担当者フィルター</div>
  <button class="filter-item active" data-filter="all" onclick="setFilter('all')">
    すべて
    <span class="filter-count" id="count-all">0</span>
  </button>
  <button class="filter-item" data-filter="恩田" onclick="setFilter('恩田')">
    恩田
    <span class="filter-count" id="count-恩田">0</span>
  </button>
  <button class="filter-item" data-filter="宏午" onclick="setFilter('宏午')">
    宏午
    <span class="filter-count" id="count-宏午">0</span>
  </button>
  <button class="filter-item" data-filter="皆川" onclick="setFilter('皆川')">
    皆川
    <span class="filter-count" id="count-皆川">0</span>
  </button>
  <button class="filter-item" data-filter="中村" onclick="setFilter('中村')">
    中村
    <span class="filter-count" id="count-中村">0</span>
  </button>
  <button class="filter-item" data-filter="松本" onclick="setFilter('松本')">
    松本
    <span class="filter-count" id="count-松本">0</span>
  </button>
  <button class="filter-item" data-filter="亀井" onclick="setFilter('亀井')">
    亀井
    <span class="filter-count" id="count-亀井">0</span>
  </button>
  <button class="filter-item" data-filter="穴澤" onclick="setFilter('穴澤')">
    穴澤
    <span class="filter-count" id="count-穴澤">0</span>
  </button>
  <button class="filter-item" data-filter="染葉" onclick="setFilter('染葉')">
    染葉
    <span class="filter-count" id="count-染葉">0</span>
  </button>
</div>

<!-- ── メインエリア ── -->
<div class="main">
  <div class="main-bar">
    <div class="main-title" id="main-title">すべての案件</div>
    <div class="total-badge" id="main-sub"></div>
  </div>
  <div class="card-grid" id="card-grid"></div>
</div>

</div><!-- /app -->

<script>
let currentFilter = 'all';

function goToCreate() {
  const url = currentFilter === 'all' ? 'create.html' : 'create.html?staff=' + encodeURIComponent(currentFilter);
  location.href = url;
}

function getCases() {
  try { return JSON.parse(localStorage.getItem('gaiheki_cases') || '[]'); } catch(e) { return []; }
}

function deleteCase(id, e) {
  e.preventDefault();
  e.stopPropagation();
  if (!confirm('この案件を削除しますか？')) return;
  const cases = getCases().filter(c => c.id !== id);
  localStorage.setItem('gaiheki_cases', JSON.stringify(cases));
  renderPage();
}

const planLabel = {light:'LIGHT', basic:'BASIC', pro:'PRO'};

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-item').forEach(el => {
    el.classList.toggle('active', el.dataset.filter === filter);
  });
  renderCards();
}

function renderPage() {
  const cases = getCases();
  const members = ['恩田','宏午','皆川','中村','松本','亀井','穴澤','染葉'];

  document.getElementById('count-all').textContent = cases.length;
  members.forEach(m => {
    const el = document.getElementById('count-' + m);
    if (el) el.textContent = cases.filter(c => c.assignee === m).length;
  });

  renderCards();
}

function renderCards() {
  const cases = getCases();
  const filtered = currentFilter === 'all' ? cases : cases.filter(c => c.assignee === currentFilter);

  const titleEl = document.getElementById('main-title');
  const subEl = document.getElementById('main-sub');
  titleEl.textContent = currentFilter === 'all' ? 'すべての案件' : currentFilter + ' の案件';
  subEl.textContent = filtered.length + '件';

  const grid = document.getElementById('card-grid');

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">📋</div>
        <div class="empty-text">案件がありません</div>
        <div class="empty-sub">「＋ 新規作成」から初回ガイダンス資料を作成してください</div>
        <a href="create.html" class="btn-new-empty">＋ 新規作成</a>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(c => {
    const plan = c.plan || 'basic';
    const areas = c.formData?.areas || [];
    const areaText = areas.length ? areas.join('・') : 'エリア未設定';
    const dateStr = c.createdAt ? c.createdAt.replace(/-/g, '/') : '—';

    return `
      <a href="create.html?id=${c.id}" class="card">
        <div class="card-top">
          <div class="card-company">${escHtml(c.company || '（会社名未入力）')}</div>
          <div class="card-plan ${plan}">${planLabel[plan] || plan}</div>
        </div>
        <div class="card-meta">
          <div class="card-assignee">👤 ${escHtml(c.assignee || '—')}</div>
          <div class="card-date">${dateStr}</div>
        </div>
        <div class="card-footer">
          <div class="card-areas">📍 ${escHtml(areaText)}</div>
          <button class="card-delete" onclick="deleteCase('${c.id}', event)">削除</button>
        </div>
      </a>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderPage();
</script>
</body>
</html>
