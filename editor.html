<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>テンプレートエディタ - gaiheki+</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--main:#3F3277;--accent:#F07200;--bg:#F3F3F3;--text:#1a1a1a;--white:#fff;--border:#dcdcdc;--label:#555;--muted:#999}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── トップバー ── */
.topbar{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:10}
.tb-logo{font-size:17px;font-weight:800;color:var(--text);text-decoration:none;letter-spacing:-.5px}
.tb-logo span{color:var(--main)}
.tb-back{font-size:12px;color:var(--muted);text-decoration:none;padding:4px 8px;border-radius:4px;white-space:nowrap}
.tb-back:hover{background:var(--bg);color:var(--main)}
.tb-div{width:1px;height:18px;background:var(--border);flex-shrink:0}
.tabs{display:flex;gap:2px;flex:1}
.tab{padding:5px 13px;font-size:12px;font-weight:600;background:none;border:none;border-radius:6px;cursor:pointer;color:var(--muted);transition:all .12s;white-space:nowrap}
.tab:hover{background:var(--bg);color:var(--main)}
.tab.active{background:#eeecf8;color:var(--main)}
.tb-actions{display:flex;gap:6px;flex-shrink:0}
.btn-reset{padding:6px 14px;background:none;border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:600;color:var(--label);cursor:pointer;transition:all .12s}
.btn-reset:hover{border-color:var(--muted);color:var(--text)}
.btn-save{padding:6px 16px;background:var(--main);color:var(--white);border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .12s}
.btn-save:hover{opacity:.85}

/* ── メインレイアウト ── */
.ed-layout{display:flex;flex:1;overflow:hidden}

/* ── プレビューペイン ── */
.preview-pane{width:50%;background:#d8d8d8;overflow-y:auto;overflow-x:hidden;padding:20px;display:flex;flex-direction:column;align-items:center;gap:20px}
.page-card{background:var(--white);width:100%;max-width:640px;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.15);overflow:hidden}
.pc-header{background:var(--main);color:var(--white);padding:9px 18px;display:flex;justify-content:space-between;align-items:center}
.pc-brand{font-size:14px;font-weight:800;letter-spacing:-.5px}
.pc-meta{font-size:10px;opacity:.85;text-align:right;line-height:1.5}
.pc-body{padding:14px 18px;font-size:11.5px;line-height:1.85;color:var(--label);min-height:160px}

/* ブロックプレビュー */
.bp-title{font-size:15px;font-weight:700;color:var(--main);margin-bottom:12px;padding-bottom:4px;border-bottom:2px solid var(--main)}
.bp-body{white-space:pre-wrap;margin-bottom:10px;color:var(--label)}
.bp-highlight{display:inline-block;background:#eeecf8;color:var(--main);font-weight:700;padding:3px 10px;border-radius:3px;margin-bottom:8px;font-size:12px}
.bp-bold{font-weight:700;color:var(--text);margin-bottom:8px}
.pp-photos{display:flex;gap:6px;margin:10px 0}
.pp-photos img{flex:1;min-width:0;aspect-ratio:4/3;object-fit:cover;border-radius:4px;background:#e8e8e8}
.p1-placeholder{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.7}

/* ── エディタペイン ── */
.editor-pane{width:50%;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.editor-inner{flex:1;overflow-y:auto;padding:14px}
.block-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:9px}
.block-head{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.style-sel{padding:4px 7px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit;background:var(--white);cursor:pointer;flex-shrink:0}
.del-btn{margin-left:auto;padding:2px 8px;font-size:11px;background:none;border:1px solid #ffd0d0;border-radius:4px;color:#e53935;cursor:pointer}
.del-btn:hover{background:#ffeaea}
.block-ta{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:inherit;resize:vertical;min-height:56px;background:var(--white);color:var(--text);line-height:1.65}
.block-ta:focus{outline:none;border-color:var(--main)}
.add-btn{width:100%;padding:9px;background:none;border:1px dashed var(--border);border-radius:6px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .12s;margin-top:2px}
.add-btn:hover{border-color:var(--main);color:var(--main);background:#f7f6fb}
.no-blocks{padding:40px;text-align:center;color:var(--muted);font-size:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:#1a1a1a;color:#fff;padding:9px 22px;border-radius:6px;font-size:12px;font-weight:600;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
(function(){
  firebase.initializeApp({apiKey:"AIzaSyCtKA71KjRHQvMPtYcURVjuSKaOanoEh7Y",authDomain:"madoguchi-guidance.firebaseapp.com",projectId:"madoguchi-guidance",storageBucket:"madoguchi-guidance.firebasestorage.app",messagingSenderId:"1080989158935",appId:"1:1080989158935:web:4b75da9e3252e8086a5652"});
  firebase.auth().onAuthStateChanged(function(u){if(!u||!(u.email||'').endsWith('@madoguchi.inc'))location.replace('login.html');});
})();
</script>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="tb-logo">gaiheki<span>+</span></a>
  <a href="index.html" class="tb-back">← 一覧へ</a>
  <div class="tb-div"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchPage('p1',this)">P1 確認事項</button>
    <button class="tab" onclick="switchPage('p2',this)">P2 写真依頼</button>
    <button class="tab" onclick="switchPage('p3',this)">P3 施策</button>
    <button class="tab" onclick="switchPage('p4',this)">P4 CS担当者</button>
  </div>
  <div class="tb-actions">
    <button class="btn-reset" onclick="resetBlocks()">リセット</button>
    <button class="btn-save" onclick="saveTemplate()">保存</button>
  </div>
</div>

<div class="ed-layout">
  <!-- プレビュー -->
  <div class="preview-pane">
    <div class="page-card" id="prev-p1">
      <div class="pc-header"><div class="pc-brand">gaiheki+</div><div class="pc-meta">宛先：<strong>（会社名）</strong> 様<br>発行日</div></div>
      <div class="pc-body" id="pb-p1"></div>
    </div>
    <div class="page-card" id="prev-p2" style="display:none">
      <div class="pc-header"><div class="pc-brand">gaiheki+</div><div class="pc-meta">写真ご提供のお願い</div></div>
      <div class="pc-body" id="pb-p2"></div>
    </div>
    <div class="page-card" id="prev-p3" style="display:none">
      <div class="pc-header"><div class="pc-brand">gaiheki+</div><div class="pc-meta">現調 / 成約施策</div></div>
      <div class="pc-body" id="pb-p3"></div>
    </div>
    <div class="page-card" id="prev-p4" style="display:none">
      <div class="pc-header"><div class="pc-brand">gaiheki+</div><div class="pc-meta">CS担当者</div></div>
      <div class="pc-body" id="pb-p4"></div>
    </div>
  </div>

  <!-- エディタ -->
  <div class="editor-pane">
    <div class="editor-inner" id="ed-blocks"></div>
  </div>
</div>

<div class="toast" id="toast">保存しました</div>

<script>
var db   = firebase.firestore();
var auth = firebase.auth();

var STYLE_LABELS = {title:'タイトルフォント',body:'テキストフォント',highlight:'背景ありフォント',bold:'太字フォント'};
var STYLE_KEYS   = ['title','body','highlight','bold'];

var DEFAULT_BLOCKS = {
  p1:[
    {id:'p1-1',type:'body',content:'このたびは外壁塗装をご検討いただきありがとうございます。\n以下のご確認事項をご確認ください。'}
  ],
  p2:[
    {id:'p2-t',  type:'title',    content:'現場・会社の写真ご提供のお願い'},
    {id:'p2-1',  type:'body',     content:'スマホ撮影の写真でも問題ありませんので、\n下記フォームより2〜5枚ほどご提供をお願いいたします。'},
    {id:'p2-r',  type:'bold',     content:'実際に写真の掲載をお願いしている理由'},
    {id:'p2-2',  type:'body',     content:'・実際に成約率やアポ率が高くなるというデータが出ている\n・施工の丁寧さや雰囲気が伝わりやすく満足度が上がる\n・結果的に利益が伸びる'},
    {id:'p2-e',  type:'bold',     content:'【おすすめの写真例】'},
    {id:'p2-3',  type:'body',     content:'・施工中の様子（職人さんの手元や後ろ姿など）\n・会社外観や社内の様子\n・スタッフ集合写真、看板、車両など'},
    {id:'p2-4',  type:'body',     content:'お手数おかけしてしまいますが、\nご協力のほど、どうぞよろしくお願いいたします。'},
    {id:'p2-m',  type:'bold',     content:'【管理画面へ追加で欲しい機能について】'},
    {id:'p2-5',  type:'body',     content:'普段、使っている機能や管理システム等が弊社管理画面にもあれば便利なのに！！\nのようなことがあればお願い致します！'}
  ],
  p3:[
    {id:'p3-h',  type:'highlight',content:'【下記、弊社からお支払いをさせて頂きます！】'},
    {id:'p3-1',  type:'bold',     content:'アマギフ1000円　現地調査完了＆お見積書提示'},
    {id:'p3-2',  type:'bold',     content:'作業金額の1%のアマギフ　作業完了後'},
    {id:'p3-u',  type:'bold',     content:'＜使い方＞'},
    {id:'p3-3',  type:'body',     content:'現地調査完了でAmazonギフト1000円分、作業完了でさらに金額の1％分のAmazonギフトをプレゼントさせていただきます。\nこれを営業トークのフックとして使っていただくことが可能なので、まずは現地見積もりにつなげるために「Amazonギフト券」をフックにして、現地見積もりのアポイントを打診してみてください。\nなお、Amazonギフト自体は弊社から直接お客様にお送りする形となります。'}
  ],
  p4:[
    {id:'p4-m',  type:'body',     content:'何かあったらお気軽に\nご連絡ください。'}
  ]
};

var blocks = JSON.parse(JSON.stringify(DEFAULT_BLOCKS));
var currentPage = 'p1';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function uid(){return 'b'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

/* ── ページ切り替え ─────────────────────────────────── */
function switchPage(pid,tab){
  currentPage = pid;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  if(tab) tab.classList.add('active');
  ['p1','p2','p3','p4'].forEach(function(id){
    document.getElementById('prev-'+id).style.display = (id===pid)?'':'none';
  });
  renderEditor();
}

/* ── プレビュー描画 ─────────────────────────────────── */
function renderPreview(pid){
  var el = document.getElementById('pb-'+pid);
  if(!el) return;
  var bl = blocks[pid]||[];
  var html='';

  if(pid==='p1'){
    html+='<div class="p1-placeholder">【ご確認事項テーブル】<br>プラン・エリア・決済手段・ログインID等（案件データから自動生成）</div>';
  }

  bl.forEach(function(b){
    var t=esc(b.content||'');
    if(b.type==='highlight'){
      html+='<div><span class="bp-highlight">'+t+'</span></div>';
    }else{
      html+='<div class="bp-'+b.type+'">'+t+'</div>';
    }
  });

  if(pid==='p2'){
    var photos='<div class="pp-photos">'+[1,2,3].map(function(i){
      return '<img src="images/gaiheki/photo'+i+'.jpg" alt="写真'+i+'" onerror="this.style.background=\'#e8e8e8\';this.removeAttribute(\'src\')">';
    }).join('')+'</div>';
    // title ブロックの後に写真を挿入
    var firstDiv=html.indexOf('</div>');
    if(firstDiv>=0) html=html.slice(0,firstDiv+6)+photos+html.slice(firstDiv+6);
    else html=photos+html;
  }

  if(pid==='p4'){
    html='<div style="background:var(--white);border:1px solid #e0e0e0;border-radius:8px;padding:14px;max-width:400px;margin:0 auto">'
      +'<div style="font-size:13px;font-weight:700;color:var(--main);margin-bottom:10px">（CS担当者名）</div>'
      +'<div style="background:#06C755;color:#fff;border-radius:6px;padding:8px 12px">'+html+'</div>'
      +'</div>';
  }

  el.innerHTML = html;
}

function renderAllPreviews(){
  ['p1','p2','p3','p4'].forEach(function(id){renderPreview(id);});
}

/* ── エディタ描画 ─────────────────────────────────────── */
function renderEditor(){
  var container = document.getElementById('ed-blocks');
  var bl = blocks[currentPage]||[];

  if(!bl.length){
    container.innerHTML='<div class="no-blocks">ブロックがありません</div>'
      +'<button class="add-btn" onclick="addBlock()">＋ ブロックを追加</button>';
    return;
  }
  var html='';
  bl.forEach(function(b){
    var opts=STYLE_KEYS.map(function(k){
      return '<option value="'+k+'"'+(b.type===k?' selected':'')+'>'+STYLE_LABELS[k]+'</option>';
    }).join('');
    html+='<div class="block-card" id="bc-'+esc(b.id)+'">'
      +'<div class="block-head">'
      +'<select class="style-sel" onchange="changeStyle(\''+esc(b.id)+'\',this.value)">'+opts+'</select>'
      +'<button class="del-btn" onclick="deleteBlock(\''+esc(b.id)+'\')">削除</button>'
      +'</div>'
      +'<textarea class="block-ta" oninput="updateContent(\''+esc(b.id)+'\',this.value)">'+esc(b.content)+'</textarea>'
      +'</div>';
  });
  html+='<button class="add-btn" onclick="addBlock()">＋ ブロックを追加</button>';
  container.innerHTML=html;
}

/* ── ブロック操作 ─────────────────────────────────────── */
function addBlock(){
  if(!blocks[currentPage]) blocks[currentPage]=[];
  blocks[currentPage].push({id:uid(),type:'body',content:''});
  renderEditor(); renderPreview(currentPage);
}
function deleteBlock(id){
  if(!confirm('このブロックを削除しますか？')) return;
  blocks[currentPage]=(blocks[currentPage]||[]).filter(function(b){return b.id!==id;});
  renderEditor(); renderPreview(currentPage);
}
function updateContent(id,val){
  var b=(blocks[currentPage]||[]).find(function(x){return x.id===id;});
  if(b){b.content=val; renderPreview(currentPage);}
}
function changeStyle(id,style){
  var b=(blocks[currentPage]||[]).find(function(x){return x.id===id;});
  if(b){b.type=style; renderEditor(); renderPreview(currentPage);}
}

/* ── 保存 ──────────────────────────────────────────────── */
function saveTemplate(){
  var user=auth.currentUser;
  if(!user){alert('未ログインです');return;}
  db.collection('templates').doc('gaiheki').set({blocks:blocks,updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
    .then(function(){
      var t=document.getElementById('toast');
      t.classList.add('show');
      setTimeout(function(){t.classList.remove('show');},2200);
    })
    .catch(function(e){alert('保存に失敗しました: '+e.message);});
}

/* ── リセット ─────────────────────────────────────────── */
function resetBlocks(){
  if(!confirm('デフォルトにリセットしますか？保存前に反映されます。')) return;
  blocks=JSON.parse(JSON.stringify(DEFAULT_BLOCKS));
  renderAllPreviews(); renderEditor();
}

/* ── 初期化 ────────────────────────────────────────────── */
auth.onAuthStateChanged(function(user){
  if(!user||!(user.email||'').endsWith('@madoguchi.inc')) return;
  db.collection('templates').doc('gaiheki').get()
    .then(function(doc){
      if(doc.exists&&doc.data().blocks){
        blocks=doc.data().blocks;
        // 不足ページはデフォルトで補完
        ['p1','p2','p3','p4'].forEach(function(pid){
          if(!blocks[pid]) blocks[pid]=JSON.parse(JSON.stringify(DEFAULT_BLOCKS[pid]));
        });
      }
      renderAllPreviews(); renderEditor();
    })
    .catch(function(e){
      console.warn('[editor] load warn:',e.message);
      renderAllPreviews(); renderEditor();
    });
});
</script>
</body>
</html>
