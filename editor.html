<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エディタ - gaiheki+</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--main:#3F3277;--accent:#F07200;--bg:#F3F3F3;--text:#1a1a1a;--white:#fff;--border:#dcdcdc;--label:#555;--muted:#999}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── トップバー ── */
.topbar{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:10}
.topbar-logo{font-size:17px;font-weight:800;color:var(--text);text-decoration:none;letter-spacing:-.5px}
.topbar-logo span{color:var(--main)}
.topbar-back{font-size:12px;color:var(--muted);text-decoration:none;padding:4px 8px;border-radius:4px}
.topbar-back:hover{background:var(--bg);color:var(--main)}
.topbar-divider{width:1px;height:18px;background:var(--border)}
.page-tabs{display:flex;gap:2px;flex:1}
.tab{padding:6px 14px;font-size:12px;font-weight:600;background:none;border:none;border-radius:6px;cursor:pointer;color:var(--muted);transition:all .12s}
.tab:hover{background:var(--bg);color:var(--main)}
.tab.active{background:#eeecf8;color:var(--main)}
.btn-save{padding:7px 18px;background:var(--main);color:var(--white);border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .12s}
.btn-save:hover{opacity:.85}

/* ── メインレイアウト ── */
.editor-layout{display:flex;flex:1;overflow:hidden}

/* ── プレビューペイン ── */
.preview-pane{width:50%;background:#d8d8d8;overflow-y:auto;overflow-x:hidden;padding:20px;display:flex;flex-direction:column;align-items:center;gap:20px}
.preview-page{background:var(--white);width:100%;max-width:660px;min-height:500px;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.15);overflow:hidden}
.pp-header{background:var(--main);color:var(--white);padding:10px 20px;display:flex;justify-content:space-between;align-items:center}
.pp-brand{font-size:14px;font-weight:800;letter-spacing:-.5px}
.pp-meta{font-size:10px;opacity:.85;text-align:right;line-height:1.5}
.pp-body{padding:16px 20px;font-size:11.5px;line-height:1.85;color:var(--label)}

/* ── ブロックプレビュースタイル ── */
.bp-title{font-size:15px;font-weight:700;color:var(--main);margin-bottom:12px;padding-bottom:5px;border-bottom:2px solid var(--main)}
.bp-body{font-size:11.5px;color:var(--label);line-height:1.9;margin-bottom:10px;white-space:pre-wrap}
.bp-highlight{display:inline-block;background:#eeecf8;color:var(--main);font-weight:700;padding:3px 10px;border-radius:3px;margin-bottom:8px;font-size:12px}
.bp-bold{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px}
.pp-photo-row{display:flex;gap:6px;margin:10px 0}
.pp-photo-row img{flex:1;min-width:0;aspect-ratio:4/3;object-fit:cover;border-radius:4px;background:#e8e8e8}

/* ── エディタペイン ── */
.editor-pane{width:50%;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.editor-pane-inner{flex:1;overflow-y:auto;padding:16px}
.block-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.block-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.block-style-sel{padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit;background:var(--white);cursor:pointer;flex-shrink:0}
.block-del{margin-left:auto;padding:3px 8px;font-size:11px;background:none;border:1px solid #ffd0d0;border-radius:4px;color:#e53935;cursor:pointer;transition:background .12s}
.block-del:hover{background:#ffeaea}
.block-textarea{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:inherit;resize:vertical;min-height:60px;background:var(--white);color:var(--text);line-height:1.65}
.block-textarea:focus{outline:none;border-color:var(--main)}
.btn-add-block{width:100%;padding:9px;background:none;border:1px dashed var(--border);border-radius:6px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .12s;margin-top:4px}
.btn-add-block:hover{border-color:var(--main);color:var(--main);background:#f7f6fb}
.editor-empty{padding:40px;text-align:center;color:var(--muted);font-size:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:#1a1a1a;color:#fff;padding:9px 22px;border-radius:6px;font-size:12px;font-weight:600;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
<!-- Firebase Auth (認証チェックのみ) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
(function(){
  firebase.initializeApp({
    apiKey:"AIzaSyCtKA71KjRHQvMPtYcURVjuSKaOanoEh7Y",
    authDomain:"madoguchi-guidance.firebaseapp.com",
    projectId:"madoguchi-guidance",
    storageBucket:"madoguchi-guidance.firebasestorage.app",
    messagingSenderId:"1080989158935",
    appId:"1:1080989158935:web:4b75da9e3252e8086a5652"
  });
  firebase.auth().onAuthStateChanged(function(user){
    if(!user||!(user.email||'').endsWith('@madoguchi.inc')) location.replace('login.html');
  });
})();
</script>
</head>
<body>

<!-- トップバー -->
<div class="topbar">
  <a href="index.html" class="topbar-logo">gaiheki<span>+</span></a>
  <a href="index.html" class="topbar-back">← 一覧へ</a>
  <div class="topbar-divider"></div>
  <div class="page-tabs">
    <button class="tab active" onclick="switchPage('p1',this)">P1 確認事項</button>
    <button class="tab" onclick="switchPage('p2',this)">P2 写真依頼</button>
    <button class="tab" onclick="switchPage('p3',this)">P3 施策</button>
    <button class="tab" onclick="switchPage('p4',this)">P4 CS担当者</button>
  </div>
  <button class="btn-save" onclick="saveEdits()">保存</button>
</div>

<!-- メイン -->
<div class="editor-layout">
  <!-- プレビューペイン -->
  <div class="preview-pane" id="preview-pane">
    <div class="preview-page" id="preview-p1">
      <div class="pp-header">
        <div class="pp-brand">gaiheki<span style="color:#fff">+</span></div>
        <div class="pp-meta" id="pp-meta1"></div>
      </div>
      <div class="pp-body" id="pp-body-p1"></div>
    </div>
    <div class="preview-page" id="preview-p2" style="display:none">
      <div class="pp-header">
        <div class="pp-brand">gaiheki<span style="color:#fff">+</span></div>
        <div class="pp-meta" id="pp-meta2"></div>
      </div>
      <div class="pp-body" id="pp-body-p2"></div>
    </div>
    <div class="preview-page" id="preview-p3" style="display:none">
      <div class="pp-header">
        <div class="pp-brand">gaiheki<span style="color:#fff">+</span></div>
        <div class="pp-meta" id="pp-meta3"></div>
      </div>
      <div class="pp-body" id="pp-body-p3"></div>
    </div>
    <div class="preview-page" id="preview-p4" style="display:none">
      <div class="pp-header">
        <div class="pp-brand">gaiheki<span style="color:#fff">+</span></div>
        <div class="pp-meta" id="pp-meta4"></div>
      </div>
      <div class="pp-body" id="pp-body-p4"></div>
    </div>
  </div>

  <!-- エディタペイン -->
  <div class="editor-pane">
    <div class="editor-pane-inner" id="editor-blocks"></div>
  </div>
</div>

<div class="toast" id="toast">保存しました</div>

<script>
const db   = firebase.firestore();
const auth = firebase.auth();
const ALLOWED = 'madoguchi.inc';

const params  = new URLSearchParams(location.search);
const CASE_ID = params.get('caseId') || '';

// ── デフォルトブロック定義 ─────────────────────────────────────
var DEFAULT_BLOCKS = {
  p1: [
    {id:'p1-1',type:'body',content:'このたびは外壁塗装をご検討いただきありがとうございます。\n以下の内容をご確認ください。'}
  ],
  p2: [
    {id:'p2-t',type:'title',content:'現場・会社の写真ご提供のお願い'},
    {id:'p2-1',type:'body',content:'スマホ撮影の写真でも問題ありませんので、\n下記フォームより2〜5枚ほどご提供をお願いいたします。'},
    {id:'p2-r',type:'bold',content:'実際に写真の掲載をお願いしている理由'},
    {id:'p2-2',type:'body',content:'・実際に成約率やアポ率が高くなるというデータが出ている\n・施工の丁寧さや雰囲気が伝わりやすく満足度が上がる\n・結果的に利益が伸びる'},
    {id:'p2-e',type:'bold',content:'【おすすめの写真例】'},
    {id:'p2-3',type:'body',content:'・施工中の様子（職人さんの手元や後ろ姿など）\n・会社外観や社内の様子\n・スタッフ集合写真、看板、車両など'},
    {id:'p2-4',type:'body',content:'お手数おかけしてしまいますが、\nご協力のほど、どうぞよろしくお願いいたします。'},
    {id:'p2-m',type:'bold',content:'【管理画面へ追加で欲しい機能について】'},
    {id:'p2-5',type:'body',content:'普段、使っている機能や管理システム等が弊社管理画面にもあれば便利なのに！！\nのようなことがあればお願い致します！'}
  ],
  p3: [
    {id:'p3-h',type:'highlight',content:'【下記、弊社からお支払いをさせて頂きます！】'},
    {id:'p3-1',type:'bold',content:'アマギフ1000円　現地調査完了＆お見積書提示'},
    {id:'p3-2',type:'bold',content:'作業金額の1%のアマギフ　作業完了後'},
    {id:'p3-u',type:'bold',content:'＜使い方＞'},
    {id:'p3-3',type:'body',content:'現地調査完了でAmazonギフト1000円分、作業完了でさらに金額の1％分のAmazonギフトをプレゼントさせていただきます。\nこれを営業トークのフックとして使っていただくことが可能なので、まずは現地見積もりにつなげるために「Amazonギフト券」をフックにして、現地見積もりのアポイントを打診してみてください。\nなお、Amazonギフト自体は弊社から直接お客様にお送りする形となります。'}
  ],
  p4: [
    {id:'p4-m',type:'body',content:'何かあったらお気軽に\nご連絡ください。'}
  ]
};

var caseData = {};
var blocks   = {};  // { p1:[...], p2:[...], p3:[...], p4:[...] }
var currentPage = 'p1';

function deepCopy(x){ return JSON.parse(JSON.stringify(x)); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function uid(){ return 'b_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

// ── スタイルラベル ────────────────────────────────────────────
var STYLE_LABELS = {
  title:'タイトルフォント', body:'テキストフォント',
  highlight:'背景ありフォント', bold:'太字フォント'
};
var STYLE_KEYS = ['title','body','highlight','bold'];

// ── ページ切り替え ────────────────────────────────────────────
function switchPage(pageId, tabEl) {
  currentPage = pageId;
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
  if (tabEl) tabEl.classList.add('active');
  ['p1','p2','p3','p4'].forEach(function(id){
    document.getElementById('preview-'+id).style.display = (id===pageId) ? '' : 'none';
  });
  renderEditor();
}

// ── プレビュー描画 ────────────────────────────────────────────
function renderPreview(pageId) {
  var blist = blocks[pageId] || [];
  var body  = document.getElementById('pp-body-' + pageId);
  if (!body) return;

  var html = '';
  blist.forEach(function(b) {
    var cls = 'bp-' + b.type;
    var text = esc(b.content || '');
    if (b.type === 'highlight') {
      html += '<div><span class="' + cls + '">' + text + '</span></div>';
    } else {
      html += '<div class="' + cls + '">' + text + '</div>';
    }
  });

  // P2: 写真エリアを title ブロックの後に挿入
  if (pageId === 'p2') {
    var photoHtml = '<div class="pp-photo-row">' +
      [1,2,3].map(function(i){
        return '<img src="images/gaiheki/photo'+i+'.jpg" alt="写真'+i+'" onerror="this.style.background=\'#e8e8e8\';this.removeAttribute(\'src\')">';
      }).join('') + '</div>';
    html = html.replace(/<\/div>/, '</div>' + photoHtml);
  }

  // P4: CS カード簡易表示
  if (pageId === 'p4') {
    var csName = (caseData.formData && caseData.formData.cs_assignee) || '—';
    html = '<div style="background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:16px;max-width:420px;margin:0 auto">' +
      '<div style="font-size:14px;font-weight:700;color:#3F3277;margin-bottom:10px">' + esc(csName) + '</div>' +
      '<div style="background:#06C755;color:#fff;border-radius:6px;padding:8px 12px;font-size:12px;font-weight:700">' + html + '</div>' +
      '</div>';
  }

  body.innerHTML = html;
}

function renderAllPreviews() {
  ['p1','p2','p3','p4'].forEach(function(id){ renderPreview(id); });
  // メタ情報
  var company = caseData.company || '（会社名）';
  var date    = (caseData.formData && caseData.formData.issue_date) || '';
  ['1','2','3','4'].forEach(function(n){
    var el = document.getElementById('pp-meta' + n);
    if (el) el.innerHTML = '宛先：<strong>' + esc(company) + '</strong> 様<br>' + (date || '');
  });
}

// ── エディタ描画 ──────────────────────────────────────────────
function renderEditor() {
  var container = document.getElementById('editor-blocks');
  var blist = blocks[currentPage] || [];

  if (blist.length === 0) {
    container.innerHTML = '<div class="editor-empty">ブロックがありません。「+ ブロックを追加」で追加してください。</div>' +
      '<button class="btn-add-block" onclick="addBlock()">＋ ブロックを追加</button>';
    return;
  }

  var html = '';
  blist.forEach(function(b, i) {
    var opts = STYLE_KEYS.map(function(k){
      return '<option value="'+k+'"'+(b.type===k?' selected':'')+'>'+STYLE_LABELS[k]+'</option>';
    }).join('');
    html += '<div class="block-item" id="bi-'+esc(b.id)+'">' +
      '<div class="block-header">' +
      '<select class="block-style-sel" onchange="changeStyle(\''+esc(b.id)+'\',this.value)">' + opts + '</select>' +
      '<button class="block-del" onclick="deleteBlock(\''+esc(b.id)+'\')">削除</button>' +
      '</div>' +
      '<textarea class="block-textarea" rows="3" oninput="updateContent(\''+esc(b.id)+'\',this.value)">'+esc(b.content)+'</textarea>' +
      '</div>';
  });
  html += '<button class="btn-add-block" onclick="addBlock()">＋ ブロックを追加</button>';
  container.innerHTML = html;
}

// ── ブロック操作 ──────────────────────────────────────────────
function addBlock() {
  if (!blocks[currentPage]) blocks[currentPage] = [];
  blocks[currentPage].push({ id: uid(), type: 'body', content: '' });
  renderEditor();
  renderPreview(currentPage);
}

function deleteBlock(id) {
  if (!confirm('このブロックを削除しますか？')) return;
  blocks[currentPage] = (blocks[currentPage] || []).filter(function(b){ return b.id !== id; });
  renderEditor();
  renderPreview(currentPage);
}

function updateContent(id, value) {
  var b = (blocks[currentPage] || []).find(function(x){ return x.id === id; });
  if (b) { b.content = value; renderPreview(currentPage); }
}

function changeStyle(id, style) {
  var b = (blocks[currentPage] || []).find(function(x){ return x.id === id; });
  if (b) { b.type = style; renderPreview(currentPage); }
}

// ── Firestore 保存 ────────────────────────────────────────────
function saveEdits() {
  if (!CASE_ID) { alert('caseIdが指定されていません'); return; }
  var user = auth.currentUser;
  if (!user) { alert('未ログインです'); return; }
  db.collection('caseEdits').doc(CASE_ID).set({
    caseId: CASE_ID,
    blocks: blocks,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    var t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }).catch(function(e) {
    alert('保存に失敗しました: ' + e.message);
    console.error('[editor] save error:', e);
  });
}

// ── 初期化 ───────────────────────────────────────────────────
auth.onAuthStateChanged(function(user) {
  if (!user || !(user.email||'').endsWith('@'+ALLOWED)) return;
  if (!CASE_ID) {
    document.getElementById('editor-blocks').innerHTML = '<div class="editor-empty">URLにcaseIdが必要です<br>例: editor.html?caseId=XXXX</div>';
    return;
  }

  // 案件データ + 編集データ を並行取得
  Promise.all([
    db.collection('cases').doc(CASE_ID).get(),
    db.collection('caseEdits').doc(CASE_ID).get()
  ]).then(function(results) {
    var caseDoc  = results[0];
    var editsDoc = results[1];

    caseData = caseDoc.exists ? caseDoc.data() : {};

    if (editsDoc.exists && editsDoc.data().blocks) {
      blocks = editsDoc.data().blocks;
    } else {
      blocks = deepCopy(DEFAULT_BLOCKS);
    }

    renderAllPreviews();
    renderEditor();
  }).catch(function(e) {
    console.error('[editor] load error:', e);
    blocks = deepCopy(DEFAULT_BLOCKS);
    renderAllPreviews();
    renderEditor();
  });
});
</script>
</body>
</html>
