<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン - gaiheki+</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: #F3F3F3;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,.10);
  padding: 48px 40px 40px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}
.logo {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: #1a1a1a;
  margin-bottom: 6px;
}
.logo span { color: #3F3277; }
.tagline {
  font-size: 12px;
  color: #999;
  margin-bottom: 36px;
}
.btn-google {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 12px 24px;
  background: #fff;
  border: 1px solid #dadce0;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  color: #3c4043;
  cursor: pointer;
  transition: background .12s, box-shadow .12s;
  width: 100%;
  justify-content: center;
}
.btn-google:hover {
  background: #f8f9fa;
  box-shadow: 0 1px 4px rgba(0,0,0,.12);
}
.btn-google svg { flex-shrink: 0; }
.error-msg {
  margin-top: 16px;
  font-size: 12px;
  color: #d93025;
  background: #fce8e6;
  border-radius: 6px;
  padding: 10px 14px;
  display: none;
}
.loading {
  margin-top: 20px;
  font-size: 12px;
  color: #999;
  display: none;
}
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">gaiheki<span>+</span></div>
  <div class="tagline">ガイダンス資料管理システム</div>

  <button class="btn-google" id="btn-login" onclick="signInWithGoogle()">
    <!-- Google G logo -->
    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
      <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 6.294C4.672 4.169 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Googleでログイン
  </button>

  <div class="error-msg" id="error-msg"></div>
  <div class="loading" id="loading">ログイン確認中…</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCtKA71KjRHQvMPtYcURVjuSKaOanoEh7Y",
  authDomain: "madoguchi-guidance.firebaseapp.com",
  projectId: "madoguchi-guidance",
  storageBucket: "madoguchi-guidance.firebasestorage.app",
  messagingSenderId: "1080989158935",
  appId: "1:1080989158935:web:4b75da9e3252e8086a5652"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const ALLOWED_DOMAIN = 'madoguchi.inc';

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('btn-login').disabled = false;
}

function signInWithGoogle() {
  document.getElementById('btn-login').disabled = true;
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(result => {
      const email = result.user.email || '';
      if (!email.endsWith('@' + ALLOWED_DOMAIN)) {
        auth.signOut();
        showError('このアカウントはご利用いただけません。\n' + ALLOWED_DOMAIN + ' のアカウントでログインしてください。');
        return;
      }
      location.href = 'index.html';
    })
    .catch(err => {
      showError('ログインに失敗しました。もう一度お試しください。');
      console.error(err);
    });
}

// 既にログイン済みなら index.html へ
document.getElementById('loading').style.display = 'block';
document.getElementById('btn-login').style.display = 'none';
auth.onAuthStateChanged(user => {
  if (user && (user.email || '').endsWith('@' + ALLOWED_DOMAIN)) {
    location.href = 'index.html';
  } else {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btn-login').style.display = '';
  }
});
</script>
</body>
</html>
