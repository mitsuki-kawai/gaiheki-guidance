<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン - gaiheki+</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#F3F3F3;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.10);padding:52px 44px 44px;width:100%;max-width:400px;text-align:center}
.logo{font-size:28px;font-weight:800;letter-spacing:-0.5px;color:#1a1a1a;margin-bottom:4px}
.logo span{color:#3F3277}
.sub{font-size:12px;color:#999;margin-bottom:44px;letter-spacing:.04em}
.btn-google{display:inline-flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px 20px;background:#fff;border:1.5px solid #dadce0;border-radius:8px;font-size:14px;font-weight:600;color:#3c4043;cursor:pointer;transition:background .12s,box-shadow .12s;font-family:inherit}
.btn-google:hover{background:#f8f9fa;box-shadow:0 1px 6px rgba(0,0,0,.12)}
.btn-google:disabled{opacity:.6;cursor:not-allowed}
.error{display:none;margin-top:16px;padding:10px 14px;background:#fce8e6;border-radius:6px;font-size:12px;color:#c62828;line-height:1.6;text-align:left}
.loading{display:none;margin-top:16px;font-size:12px;color:#999}
</style>
</head>
<body>
<div class="card">
  <div class="logo">gaiheki<span>+</span></div>
  <div class="sub">ガイダンス資料管理システム</div>
  <button class="btn-google" id="btn" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908C16.658 14.233 17.64 11.925 17.64 9.2z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
      <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 6.294C4.672 4.169 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Googleでログイン
  </button>
  <div class="error" id="err"></div>
  <div class="loading" id="loading">確認中…</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
const ALLOWED = 'madoguchi.inc';
firebase.initializeApp({
  apiKey: "AIzaSyCtKA71KjRHQvMPtYcURVjuSKaOanoEh7Y",
  authDomain: "madoguchi-guidance.firebaseapp.com",
  projectId: "madoguchi-guidance",
  storageBucket: "madoguchi-guidance.firebasestorage.app",
  messagingSenderId: "1080989158935",
  appId: "1:1080989158935:web:4b75da9e3252e8086a5652"
});
const auth = firebase.auth();

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg; e.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('btn').disabled = false;
}

function signIn() {
  document.getElementById('btn').disabled = true;
  document.getElementById('err').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .then(r => {
      const email = r.user.email || '';
      if (!email.endsWith('@' + ALLOWED)) {
        return auth.signOut().then(() => showErr('@' + ALLOWED + ' のアカウントでログインしてください。\n(' + email + ')'));
      }
      location.href = 'gaiheki.html';
    })
    .catch(err => {
      if (err.code === 'auth/popup-closed-by-user') {
        document.getElementById('btn').disabled = false;
        document.getElementById('loading').style.display = 'none';
      } else {
        showErr('ログインに失敗しました。もう一度お試しください。');
      }
    });
}

// 既ログイン済みチェック
document.getElementById('btn').style.display = 'none';
document.getElementById('loading').style.display = 'block';
auth.onAuthStateChanged(user => {
  if (user && (user.email || '').endsWith('@' + ALLOWED)) {
    location.href = 'gaiheki.html';
  } else {
    document.getElementById('btn').style.display = '';
    document.getElementById('loading').style.display = 'none';
  }
});
</script>
</body>
</html>
